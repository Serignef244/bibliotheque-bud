databases:
  - name: bibliosmart-db
    databaseName: bibliosmart
    user: bibliosmart_user
    plan: free

services:
  - type: web
    name: bibliosmart-app
    env: php
    plan: free
    buildCommand: "./render-build.sh"
    startCommand: "apache2-foreground"
    envVars:
      - key: APP_KEY
        generateValue: true
      - key: APP_NAME
        value: BiblioSmart
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_URL
        fromDatabase:
          name: bibliosmart-db
          property: connectionString
