databases:
  - name: bibliosmart-db
    databaseName: bibliosmart
    user: bibliosmart_user
    plan: free

services:
  - type: web
    name: bibliosmart-app
    env: docker
    plan: free
    envVars:
      - key: APP_KEY
        generateValue: true
      - key: APP_NAME
        value: BiblioSmart
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: true
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_URL
        fromDatabase:
          name: bibliosmart-db
          property: connectionString
