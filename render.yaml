databases:
  - name: bibliosmart-db
    databaseName: bibliosmart
    user: bibliosmart_user
    plan: free

services:
  - type: web
    name: bibliosmart-app
    env: docker
    plan: free
    envVars:
      - key: APP_KEY
        value: "base64:tSNczExZGU++h+UYtpyF0GyxCshQMrf5NydW7czl63Q="
      - key: APP_NAME
        value: BiblioSmart
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: true
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_URL
        fromDatabase:
          name: bibliosmart-db
          property: connectionString
      - key: MAIL_MAILER
        value: smtp
      - key: MAIL_HOST
        value: sandbox.smtp.mailtrap.io
      - key: MAIL_PORT
        value: 2525
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: MAIL_ENCRYPTION
        value: tls
      - key: MAIL_FROM_ADDRESS
        value: bibliosmart@example.com
      - key: MAIL_FROM_NAME
        value: BiblioSmart
      - key: CLOUDINARY_CLOUD_NAME
        value: "dmdtrqkdv"
      - key: CLOUDINARY_API_KEY
        value: "523957753761896"
      - key: CLOUDINARY_API_SECRET
